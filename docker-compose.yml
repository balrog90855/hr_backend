services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hr-app-api
    ports:
      - "8000:8000"
    environment:
      DB_HOST: db
      DB_USER: root
      DB_PASSWORD: ${DB_PASSWORD:-password}
      DB_NAME: hr_app
      DB_PORT: 3306
      HR_APP_ADMIN_TOKENS: ${HR_APP_ADMIN_TOKENS:-dev-token}
      HR_APP_JWT_SECRET: ${HR_APP_JWT_SECRET:-change-me-in-production}
      HR_APP_ACCESS_TOKEN_MINUTES: ${HR_APP_ACCESS_TOKEN_MINUTES:-30}
      HR_APP_REFRESH_TOKEN_DAYS: ${HR_APP_REFRESH_TOKEN_DAYS:-7}
    depends_on:
      - db
    restart: unless-stopped

  db:
    image: mysql:8.0
    container_name: hr-app-db
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-password}
      MYSQL_DATABASE: hr_app
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    restart: unless-stopped

volumes:
  db_data: