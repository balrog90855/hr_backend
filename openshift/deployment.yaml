apiVersion: apps/v1
kind: Deployment
metadata:
  name: hr-app-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hr-app-api
  template:
    metadata:
      labels:
        app: hr-app-api
    spec:
      containers:
        - name: api
          image: image-registry.openshift-image-registry.svc:5000/your-project/hr-app-api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
              protocol: TCP
          envFrom:
            - configMapRef:
                name: hr-app-api-config
            - secretRef:
                name: hr-app-api-secrets
          readinessProbe:
            httpGet:
              path: /api/health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 20
